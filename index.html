<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-Guards — security scanner for vibe-coded apps</title>
    <meta name="description" content="Scan your Cursor, Lovable, Bolt, or Replit app in 60 seconds. Get a Vibe Score, find leaked API keys, broken Supabase RLS, and missing security headers — with paste-ready fix prompts for your AI." />
    <link rel="canonical" href="https://v-guards.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#09090b" />
    <!-- Performance: connect early to font + Turnstile origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />
    <!-- Google Fonts: media="print" doesn't apply, so it doesn't block render.
         main.tsx flips media to "all" after the bundle loads, applying the font.
         No inline event handlers (CSP-friendly). -->
    <link id="vg-fonts" rel="stylesheet" media="print" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    </noscript>
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://v-guards.com/" />
    <meta property="og:title" content="V-Guards — security scanner for vibe-coded apps" />
    <meta property="og:description" content="Scan your Cursor, Lovable, Bolt, or Replit app in 60 seconds. Vibe Score + paste-ready fix prompts." />
    <meta property="og:image" content="https://v-guards.com/logo-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="V-Guards" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="V-Guards — security scanner for vibe-coded apps" />
    <meta name="twitter:description" content="Scan your AI-built app for leaked keys, broken RLS, missing headers — with paste-ready fix prompts." />
    <meta name="twitter:image" content="https://v-guards.com/logo-512.png" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
